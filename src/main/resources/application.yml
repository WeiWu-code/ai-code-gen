spring:
  application:
    name: xd-ww-ai-code-gen-backend
  # session 配置
  session:
    timeout: 1800

  datasource:
    username: root
    password: 123456
    url: jdbc:mysql://localhost:3306/ai_code_gen
  profiles:
    active: local

  # redis
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      ttl: 3600

server:
  port: 9010
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 1800
        # 30分钟过期

# springdoc-openapi配置
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: xd.ww.wwaicodegen.controller
# knife4j额外配置
knife4j:
  enable: true
  setting:
    language: zh_cn
