spring:
  application:
    name: xd-ww-ai-code-gen-backend

server:
  port: 9010
  servlet:
    context-path: /api

# springdoc-openapi配置
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: xd.ww.wwaicodegen.controller
# knife4j额外配置
knife4j:
  enable: true
  setting:
    language: zh_cn
